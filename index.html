<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K线训练 - 每日练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
        }
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.5em; color: #e94560; }
        .stats { display: flex; gap: 20px; font-size: 0.9em; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #e94560; }
        .stat-label { color: #888; font-size: 0.8em; }
        /* 主要布局 */
        .main { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) {
            .main { flex-direction: row; }
            .chart-area { flex: 1; }
            .control-panel { width: 300px; }
        }
        /* K线图区域 */
        .chart-area {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }
        .stock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .stock-name { font-size: 1.2em; font-weight: bold; }
        .stock-price { font-size: 1.8em; font-weight: bold; }
        .price-up { color: #e94560; }
        .price-down { color: #0cce6b; }
        .price-flat { color: #888; }
        canvas {
            width: 100%;
            height: 400px;
            border-radius: 8px;
        }
        @media (max-width: 767px) {
            canvas { height: 300px; }
        }
        /* 控制面板 */
        .control-panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }
        .section-title {
            font-size: 1em;
            color: #888;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        /* 预测按钮 */
        .predict-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .predict-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .predict-btn:hover { transform: scale(1.05); }
        .predict-btn:active { transform: scale(0.95); }
        .btn-up {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
        }
        .btn-down {
            background: linear-gradient(135deg, #0cce6b, #0aa557);
            color: white;
        }
        .predict-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        /* 结果显示 */
        .result {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .result.show { display: block; }
        .result-correct {
            background: rgba(12, 206, 107, 0.2);
            border: 1px solid #0cce6b;
        }
        .result-wrong {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
        }
        .result-icon { font-size: 3em; margin-bottom: 10px; }
        .result-text { font-size: 1.2em; font-weight: bold; }
        .result-detail { color: #888; margin-top: 5px; }
        /* 设置区域 */
        .settings { margin-bottom: 20px; }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .setting-label { color: #aaa; }
        select, input[type="number"] {
            background: #0f3460;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
        }
        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0cce6b);
            transition: width 0.3s;
        }
        /* 历史记录 */
        .history {
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 0.85em;
        }
        .history-correct { color: #0cce6b; }
        .history-wrong { color: #e94560; }
        /* 新按钮 */
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #1a4a8a, #1e2d50); }
        /* 提示 */
        .hint {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #e94560;
        }
        /* 隐藏的K线数据 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 K线训练</h1>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalRound">0</div>
                    <div class="stat-label">总轮次</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="correctRate">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">连续正确</div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="chart-area">
                <div class="stock-info">
                    <div>
                        <span class="stock-name" id="stockCode">--</span>
                        <span style="color:#888; margin-left:10px;" id="stockDate">--</span>
                    </div>
                    <div class="stock-price price-flat" id="currentPrice">--</div>
                </div>
                <canvas id="klineCanvas"></canvas>
                <div class="hint" id="hint" style="display:none;">
                    💡 观察K线形态、成交量、趋势，预测下一根K线方向
                </div>
            </div>

            <div class="control-panel">
                <div class="section-title">🎯 预测方向</div>
                <div class="predict-buttons">
                    <button class="predict-btn btn-up" id="btnUp" onclick="predict('up')">
                        📈 看涨
                    </button>
                    <button class="predict-btn btn-down" id="btnDown" onclick="predict('down')">
                        📉 看跌
                    </button>
                </div>

                <div class="result" id="result">
                    <div class="result-icon" id="resultIcon"></div>
                    <div class="result-text" id="resultText"></div>
                    <div class="result-detail" id="resultDetail"></div>
                </div>

                <button class="btn-primary" id="btnNext" onclick="nextRound()" style="display:none;">
                    下一题 →
                </button>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div style="text-align:center; color:#888; font-size:0.8em;" id="progressText">
                    今日训练: 0/10
                </div>

                <div class="section-title" style="margin-top:20px;">⚙️ 设置</div>
                <div class="settings">
                    <div class="setting-item">
                        <span class="setting-label">难度</span>
                        <select id="difficulty" onchange="changeDifficulty()">
                            <option value="easy">简单 (30根K线)</option>
                            <option value="medium" selected>中等 (60根K线)</option>
                            <option value="hard">困难 (120根K线)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">每日目标</span>
                        <select id="dailyGoal" onchange="changeDailyGoal()">
                            <option value="10" selected>10题</option>
                            <option value="20">20题</option>
                            <option value="50">50题</option>
                        </select>
                    </div>
                </div>

                <div class="section-title" style="margin-top:20px;">📊 今日记录</div>
                <div class="history" id="history"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            easy: 30,
            medium: 60,
            hard: 120
        };

        // ============ 状态 ============
        let state = {
            currentData: [],
            currentIndex: 0,
            answer: null,
            predicted: false,
            totalRound: 0,
            correct: 0,
            streak: 0,
            dailyGoal: 10,
            todayCount: 0,
            history: []
        };

        // ============ 生成K线数据 ============
        function generateKlineData(count) {
            const data = [];
            let price = 100 + Math.random() * 100; // 初始价格 100-200
            
            // 随机选择趋势
            const trendType = Math.random();
            let trend = 0;
            if (trendType < 0.3) trend = 0.002; // 上升趋势
            else if (trendType < 0.6) trend = -0.002; // 下降趋势
            // else 震荡
            
            for (let i = 0; i < count; i++) {
                // 添加趋势
                const trendForce = trend * (1 + Math.sin(i / 10) * 0.5);
                
                // 随机波动
                const volatility = 0.02;
                const change = (Math.random() - 0.5) * volatility + trendForce;
                
                const open = price;
                const close = price * (1 + change);
                const high = Math.max(open, close) * (1 + Math.random() * 0.01);
                const low = Math.min(open, close) * (1 - Math.random() * 0.01);
                const volume = Math.floor(1000000 + Math.random() * 5000000);
                
                data.push({
                    date: `Day ${i + 1}`,
                    open: +open.toFixed(2),
                    close: +close.toFixed(2),
                    high: +high.toFixed(2),
                    low: +low.toFixed(2),
                    volume: volume
                });
                
                price = close;
            }
            
            return data;
        }

        // ============ 绘制K线图 ============
        function drawKline(data, showAnswer = false, answerIndex = -1) {
            const canvas = document.getElementById('klineCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置canvas尺寸
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            
            const width = rect.width;
            const height = rect.height;
            const padding = { top: 20, right: 60, bottom: 60, left: 10 };
            
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);
            
            if (data.length === 0) return;
            
            // 计算价格范围
            const prices = data.flatMap(d => [d.high, d.low]);
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);
            const priceRange = maxPrice - minPrice || 1;
            
            // 计算成交量范围
            const volumes = data.map(d => d.volume);
            const maxVolume = Math.max(...volumes);
            
            // K线宽度
            const klineWidth = (width - padding.left - padding.right) / data.length;
            const bodyWidth = Math.max(klineWidth * 0.7, 2);
            
            // 绘制网格
            ctx.strokeStyle = '#1a1a3e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (height - padding.top - padding.bottom) * i / 5;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
                
                // 价格标签
                const price = maxPrice - priceRange * i / 5;
                ctx.fillStyle = '#666';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(price.toFixed(2), width - padding.right + 5, y + 4);
            }
            
            // 绘制K线
            data.forEach((item, index) => {
                const x = padding.left + index * klineWidth + klineWidth / 2;
                const isUp = item.close >= item.open;
                const color = isUp ? '#e94560' : '#0cce6b';
                
                // 影线
                const highY = padding.top + (1 - (item.high - minPrice) / priceRange) * (height - padding.top - padding.bottom);
                const lowY = padding.top + (1 - (item.low - minPrice) / priceRange) * (height - padding.top - padding.bottom);
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, highY);
                ctx.lineTo(x, lowY);
                ctx.stroke();
                
                // 实体
                const openY = padding.top + (1 - (item.open - minPrice) / priceRange) * (height - padding.top - padding.bottom);
                const closeY = padding.top + (1 - (item.close - minPrice) / priceRange) * (height - padding.top - padding.bottom);
                const bodyTop = Math.min(openY, closeY);
                const bodyHeight = Math.abs(openY - closeY) || 1;
                
                if (isUp) {
                    ctx.fillStyle = color;
                    ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
                } else {
                    ctx.fillStyle = color;
                    ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
                }
                
                // 成交量
                const volumeHeight = (item.volume / maxVolume) * 40;
                const volumeY = height - padding.bottom;
                ctx.fillStyle = isUp ? 'rgba(233, 69, 96, 0.3)' : 'rgba(12, 206, 107, 0.3)';
                ctx.fillRect(x - bodyWidth / 2, volumeY - volumeHeight, bodyWidth, volumeHeight);
            });
            
            // 绘制答案区域（虚线）
            if (showAnswer && answerIndex >= 0 && answerIndex < data.length) {
                const x = padding.left + answerIndex * klineWidth + klineWidth / 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, padding.top);
                ctx.lineTo(x, height - padding.bottom);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 问号
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('?', x, height / 2);
            }
            
            // 绘制日期标签
            ctx.fillStyle = '#666';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            const dateStep = Math.max(Math.floor(data.length / 6), 1);
            for (let i = 0; i < data.length; i += dateStep) {
                const x = padding.left + i * klineWidth + klineWidth / 2;
                ctx.fillText(data[i].date, x, height - padding.bottom + 20);
            }
        }

        // ============ 开始新轮次 ============
        function startRound() {
            const difficulty = document.getElementById('difficulty').value;
            const count = CONFIG[difficulty];
            
            // 生成数据
            state.currentData = generateKlineData(count + 1); // +1 用于预测
            state.currentIndex = count - 1; // 显示到倒数第二根
            state.answer = state.currentData[count]; // 最后一根是答案
            state.predicted = false;
            
            // 显示K线（不含最后一根）
            const displayData = state.currentData.slice(0, count);
            drawKline(displayData, true, count - 1);
            
            // 更新UI
            document.getElementById('stockCode').textContent = `训练 #${state.totalRound + 1}`;
            document.getElementById('stockDate').textContent = `观察 ${count} 根K线`;
            document.getElementById('currentPrice').textContent = displayData[count - 1].close.toFixed(2);
            document.getElementById('currentPrice').className = 'stock-price price-flat';
            
            // 启用按钮
            document.getElementById('btnUp').disabled = false;
            document.getElementById('btnDown').disabled = false;
            
            // 隐藏结果和下一题按钮
            document.getElementById('result').classList.remove('show');
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('hint').style.display = 'block';
        }

        // ============ 预测 ============
        function predict(direction) {
            if (state.predicted) return;
            state.predicted = true;
            
            // 禁用按钮
            document.getElementById('btnUp').disabled = true;
            document.getElementById('btnDown').disabled = true;
            
            // 判断结果
            const lastClose = state.currentData[state.currentIndex].close;
            const answerClose = state.answer.close;
            const actualDirection = answerClose > lastClose ? 'up' : 'down';
            const isCorrect = direction === actualDirection;
            
            // 更新统计
            state.totalRound++;
            if (isCorrect) {
                state.correct++;
                state.streak++;
            } else {
                state.streak = 0;
            }
            state.todayCount++;
            
            // 记录历史
            state.history.unshift({
                correct: isCorrect,
                predict: direction,
                actual: actualDirection,
                change: ((answerClose - lastClose) / lastClose * 100).toFixed(2)
            });
            
            // 显示答案K线
            const displayData = [...state.currentData.slice(0, state.currentIndex + 1), state.answer];
            drawKline(displayData);
            
            // 显示结果
            const result = document.getElementById('result');
            result.className = `result show ${isCorrect ? 'result-correct' : 'result-wrong'}`;
            document.getElementById('resultIcon').textContent = isCorrect ? '✅' : '❌';
            document.getElementById('resultText').textContent = isCorrect ? '预测正确！' : '预测错误！';
            document.getElementById('resultDetail').textContent = 
                `你预测: ${direction === 'up' ? '📈看涨' : '📉看跌'} | ` +
                `实际: ${actualDirection === 'up' ? '📈上涨' : '📉下跌'} ${Math.abs(state.change || 0)}%`;
            
            // 更新价格显示
            const priceEl = document.getElementById('currentPrice');
            priceEl.textContent = answerClose.toFixed(2);
            priceEl.className = `stock-price ${actualDirection === 'up' ? 'price-up' : 'price-down'}`;
            
            // 显示下一题按钮
            document.getElementById('btnNext').style.display = 'block';
            document.getElementById('hint').style.display = 'none';
            
            // 更新统计
            updateStats();
            saveProgress();
        }

        // ============ 下一题 ============
        function nextRound() {
            if (state.todayCount >= state.dailyGoal) {
                alert(`🎉 恭喜完成今日训练！\n\n今日成绩: ${state.todayCount}题\n正确率: ${Math.round(state.correct / state.totalRound * 100)}%`);
                state.todayCount = 0;
            }
            startRound();
        }

        // ============ 更新统计 ============
        function updateStats() {
            document.getElementById('totalRound').textContent = state.totalRound;
            document.getElementById('correctRate').textContent = 
                state.totalRound > 0 ? Math.round(state.correct / state.totalRound * 100) + '%' : '0%';
            document.getElementById('streak').textContent = state.streak;
            
            // 进度条
            const progress = Math.min(state.todayCount / state.dailyGoal * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `今日训练: ${state.todayCount}/${state.dailyGoal}`;
            
            // 历史记录
            const historyEl = document.getElementById('history');
            historyEl.innerHTML = state.history.slice(0, 10).map(h => `
                <div class="history-item">
                    <span class="${h.correct ? 'history-correct' : 'history-wrong'}">
                        ${h.correct ? '✅' : '❌'} 
                        ${h.predict === 'up' ? '看涨' : '看跌'}
                    </span>
                    <span style="color:#888">
                        实际${h.actual === 'up' ? '上涨' : '下跌'} ${h.change}%
                    </span>
                </div>
            `).join('');
        }

        // ============ 保存进度 ============
        function saveProgress() {
            const data = {
                totalRound: state.totalRound,
                correct: state.correct,
                streak: state.streak,
                todayCount: state.todayCount,
                date: new Date().toDateString(),
                history: state.history.slice(0, 50)
            };
            localStorage.setItem('kline-trainer', JSON.stringify(data));
        }

        // ============ 加载进度 ============
        function loadProgress() {
            const saved = localStorage.getItem('kline-trainer');
            if (saved) {
                const data = JSON.parse(saved);
                // 检查是否是今天的数据
                if (data.date === new Date().toDateString()) {
                    state.totalRound = data.totalRound || 0;
                    state.correct = data.correct || 0;
                    state.streak = data.streak || 0;
                    state.todayCount = data.todayCount || 0;
                    state.history = data.history || [];
                } else {
                    // 新的一天，保留总成绩但重置今日
                    state.totalRound = data.totalRound || 0;
                    state.correct = data.correct || 0;
                    state.streak = data.streak || 0;
                    state.todayCount = 0;
                    state.history = [];
                }
                updateStats();
            }
        }

        // ============ 设置变更 ============
        function changeDifficulty() {
            // 下一轮生效
        }

        function changeDailyGoal() {
            state.dailyGoal = parseInt(document.getElementById('dailyGoal').value);
            updateStats();
        }

        // ============ 初始化 ============
        window.onload = function() {
            loadProgress();
            state.dailyGoal = parseInt(document.getElementById('dailyGoal').value);
            startRound();
        };

        // 响应式重绘
        window.addEventListener('resize', () => {
            if (state.currentData.length > 0) {
                const displayData = state.predicted ? 
                    [...state.currentData.slice(0, state.currentIndex + 1), state.answer] :
                    state.currentData.slice(0, state.currentIndex + 1);
                drawKline(displayData, !state.predicted, state.predicted ? -1 : state.currentIndex);
            }
        });
    </script>
</body>
</html>
