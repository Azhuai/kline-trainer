<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K线训练</title>
<script src="/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:1.1em;color:#58a6ff}
.sts{display:flex;gap:14px;font-size:.8em}
.sts b{color:#58a6ff}
.wrap{max-width:1400px;margin:0 auto;padding:10px}
.modes{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.mbtn{padding:7px 14px;background:#1c2333;border:1px solid #30363d;color:#e6edf3;border-radius:6px;cursor:pointer;font-size:.85em}
.mbtn.on{background:#58a6ff;color:#000;font-weight:bold}
.row{display:flex;gap:10px;flex-direction:column}
@media(min-width:1024px){.row{flex-direction:row}.left{flex:1}.right{width:280px}}
.box{background:#1c2333;border-radius:10px;border:1px solid #30363d;overflow:hidden}
.box-h{padding:10px 14px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.code{font-weight:bold;font-size:1.1em}
.prc{font-size:1.3em;font-weight:bold}
.up{color:#ef4444}.dn{color:#22c55e}
#chart,#chart2{width:100%;height:700px}
@media(max-width:768px){#chart,#chart2{height:500px}}
.card{background:#1c2333;border-radius:10px;border:1px solid #30363d;padding:12px;margin-bottom:10px}
.card-t{font-size:.8em;color:#8b949e;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #30363d}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.btns4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.abtn{padding:10px 4px;border:none;border-radius:8px;font-size:.85em;font-weight:bold;cursor:pointer}
.abtn:hover{opacity:.9}.abtn:disabled{opacity:.4;cursor:not-allowed}
.bb{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.bs{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.bh{background:linear-gradient(135deg,#eab308,#ca8a04);color:#fff}
.bw{background:linear-gradient(135deg,#6b7280,#4b5563);color:#fff}
.res{text-align:center;padding:14px;border-radius:8px;display:none;margin-bottom:10px}
.res.show{display:block}
.res.ok{background:rgba(34,197,94,.15);border:1px solid #22c55e}
.res.no{background:rgba(239,68,68,.15);border:1px solid #ef4444}
.res.trade{background:rgba(88,166,255,.15);border:1px solid #58a6ff}
.res i{font-size:1.8em}
.res p{font-weight:bold;margin:4px 0}
.res span{color:#8b949e;font-size:.8em}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.85em}
.bp{background:#58a6ff;color:#000;font-weight:bold}
.bs2{background:#0d1117;border:1px solid #30363d;color:#e6edf3}
.set{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #30363d}
.set:last-child{border:0}
.set label{color:#8b949e;font-size:.8em}
select,input{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:5px 8px;border-radius:5px;font-size:.8em}
.pbar{height:5px;background:#0d1117;border-radius:3px;overflow:hidden;margin:6px 0}
.pfill{height:100%;background:linear-gradient(90deg,#58a6ff,#22c55e)}
.ptxt{text-align:center;color:#8b949e;font-size:.7em}
.bhr{text-align:center;margin-top:6px;font-size:.85em}
.hist{max-height:150px;overflow-y:auto}
.ht{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #30363d;font-size:.75em}
.hc{color:#22c55e}.hw{color:#ef4444}
.empty{text-align:center;padding:16px;color:#8b949e;font-size:.8em}
.badge{background:#a855f7;color:#fff;padding:1px 6px;border-radius:3px;font-size:.65em;margin-left:6px}
.tip{max-width:220px !important;word-break:break-all !important}
@media(max-width:768px){.tip{font-size:11px !important;max-width:180px !important}}
.trade-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;margin-bottom:8px;font-size:.8em}
.trade-box .row-t{display:flex;justify-content:space-between;padding:3px 0}
.trade-box .lb{color:#8b949e}
.trade-box .vl{font-weight:bold}
.trade-box .vl.up{color:#ef4444}.trade-box .vl.dn{color:#22c55e}
</style>
</head>
<body>
<div class="hdr">
<h1>K 线训练系统 - **日 K 线**数据</h1>
<div class="sts"><span>📊 总<b id="sT">0</b></span><span>✅ 率<b id="sR">0%</b></span><span>🔥 连<b id="sS">0</b></span><span>⭐ 分<b id="sP">0</b></span></div>
</div>
<div class="wrap">
<div class="modes">
<button class="mbtn on" onclick="swM('train',event)">📊 训练</button>
<button class="mbtn" onclick="swM('blind',event)">🔍 盲测</button>
<button class="mbtn" onclick="swM('stock',event)">📈 个股训练</button>
<button class="mbtn" onclick="swM('stockblind',event)">🔍 个股盲测</button>
<button class="mbtn" onclick="swM('board',event)">🏆 排行榜</button>
<span style="margin-left:12px;color:#8b949e;font-size:.8em;line-height:2.4">副指标：</span>
<button class="mbtn on" id="indKDJ" onclick="swI('kdj')">KDJ</button>
<button class="mbtn" id="indDMA" onclick="swI('dma')">DMA</button>
</div>

<!-- 训练/盲测模式 -->
<div class="row" id="vTrain">
<div class="left">
<div class="box">
<div class="box-h">
<div><span class="code" id="dC">--</span><span class="badge" id="dB" style="display:none">盲测</span><span style="color:#8b949e;font-size:.85em;margin-left:8px" id="dD">--</span></div>
<div class="prc" id="dP">--</div>
</div>
<div id="chart"></div>
</div>
</div>
<div class="right">
<div class="card">
<div class="card-t">🎯 预测操作</div>
<div style="color:#8b949e;font-size:.85em;margin-bottom:8px">📌 已在 <b id="bBuyDate">--</b> 买入 <b id="bBuyPrice">--</b></div>
<div class="btns">
<button class="abtn bs" id="bSell" onclick="act('sell')">📉 卖出</button>
<button class="abtn bh" id="bHold" onclick="act('hold')">⏸️ 持有</button>
</div>
<div class="res" id="rBox"><i id="rI"></i><p id="rT"></p><span id="rD"></span></div>
<div style="display:flex;gap:6px"><button class="btn bp" id="bN" onclick="nxt()" style="display:none;flex:1">➡️ 下一题</button><button class="btn bs2" onclick="chg()" style="flex:1">🔄 换股</button></div>
</div>
<div class="card">
<div class="card-t">⚙️ 设置</div>
<div class="set"><label>K线数</label><select id="sL" onchange="go()"><option>30</option><option selected>60</option><option>90</option><option>120</option></select></div>
<div class="set"><label>每日目标(题)</label><select id="sG" onchange="T.g=+this.value;uUI()"><option selected>10</option><option>20</option><option>50</option></select></div>
<div class="set" style="flex-direction:column;align-items:stretch"><label>个股代码</label><div style="display:flex;gap:4px;margin-top:4px"><input id="sI" style="flex:1" placeholder="sh.600519" onkeydown="if(event.key==='Enter')go()"><button class="btn bs2" onclick="go()">确定</button></div><div style="color:#8b949e;font-size:.7em;margin-top:4px">上证sh.600519 深证sz.000858 科创sh.688981 北交bj.430047</div></div>
</div>
<div class="card">
<div class="card-t">📊 进度</div>
<div class="pbar"><div class="pfill" id="pF" style="width:0%"></div></div>
<div class="ptxt" id="pT">0/10</div>
<div class="bhr">买入持有: <b id="bR">--</b></div>
</div>
<div class="card">
<div class="card-t">📋 记录</div>
<div class="hist" id="hL"><div class="empty">暂无</div></div>
</div>
</div>
</div>

<!-- 个股训练/盲测模式 -->
<div class="row" id="vStock" style="display:none">
<div class="left">
<div class="box">
<div class="box-h">
<div><span class="code" id="stC">--</span><span class="badge" id="stB" style="display:none">盲测</span><span style="color:#8b949e;font-size:.85em;margin-left:8px" id="stD">--</span></div>
<div class="prc" id="stP">--</div>
</div>
<div id="chart2"></div>
</div>
</div>
<div class="right">
<div class="card">
<div class="card-t">🎯 交易操作</div>
<div class="btns4">
<button class="abtn bb" onclick="stockAct('buy')">📈 买入</button>
<button class="abtn bs" onclick="stockAct('sell')">📉 卖出</button>
<button class="abtn bh" onclick="stockAct('hold')">⏸️ 持有</button>
<button class="abtn bw" onclick="stockAct('wait')">⏭️ 等待</button>
</div>
<div style="display:flex;gap:6px">
<button class="btn bp" id="stNext" onclick="stockNext()" style="flex:1;display:none">➡️ 下一天</button>
<button class="btn bs2" onclick="stockReset()" style="flex:1">🔄 换股</button>
</div>
</div>
<div class="card">
<div class="card-t">⚙️ 设置</div>
<div class="set"><label>K线数</label><select id="stStep" onchange="stockChangeStep()"><option value="30">30</option><option value="60" selected>60</option><option value="90">90</option><option value="120">120</option><option value="150">150</option><option value="0">无限期</option></select></div>
</div>
<div class="card">
<div class="card-t">💰 收益</div>
<div class="trade-box" id="tBox">
<div class="row-t"><span class="lb">累积收益</span><span class="vl" id="tPnl">0.00%</span></div>
<div class="row-t"><span class="lb">持仓收益</span><span class="vl" id="tHoldPnl">--</span></div>
</div>
</div>
<div class="card">
<div class="card-t">📊 交易统计</div>
<div class="trade-box">
<div class="row-t"><span class="lb">交易天数</span><span class="vl" id="stDays">0</span></div>
<div class="row-t"><span class="lb">买入次数</span><span class="vl" id="stBuys">0</span></div>
<div class="row-t"><span class="lb">卖出次数</span><span class="vl" id="stSells">0</span></div>
<div class="row-t"><span class="lb">胜率</span><span class="vl" id="stWin">--</span></div>
</div>
</div>
<div class="card">
<div class="card-t">📋 交易记录</div>
<div class="hist" id="stHL"><div class="empty">暂无</div></div>
</div>
</div>
</div>

<!-- 排行榜 -->
<div class="row" id="vBoard" style="display:none">
<div class="card" style="flex:1">
<div class="card-t">🏆 排行榜</div>
<div class="modes" style="margin-bottom:8px">
<button class="mbtn on" onclick="ldB('train',this)">📊 训练</button>
<button class="mbtn" onclick="ldB('blind',this)">🔍 盲测</button>
<button class="mbtn" onclick="ldB('stock',this)">📈 个股训练</button>
<button class="mbtn" onclick="ldB('stockblind',this)">🔍 个股盲测</button>
</div>
<div id="bKL" style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
<button class="mbtn on" onclick="ldK(-1,this)">全部</button>
<button class="mbtn" onclick="ldK(30,this)">30</button>
<button class="mbtn" onclick="ldK(60,this)">60</button>
<button class="mbtn" onclick="ldK(90,this)">90</button>
<button class="mbtn" onclick="ldK(120,this)">120</button>
<button class="mbtn" onclick="ldK(150,this)">150</button>
<button class="mbtn" onclick="ldK(0,this)">无限期</button>
</div>
<div id="bL"><div class="empty">暂无数据</div></div>
</div>
</div>
</div>

<script>
// ===== 通用工具 =====
function r2(v){return v==null||isNaN(v)?'0.00':Number(v).toFixed(2)}
function fv(v){return v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(2)+'万':String(v)}
function fmt(v){return Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function api(p,q){var u='/api/'+p;if(q){var s=new URLSearchParams(q).toString();if(s)u+='?'+s}return fetch(u).then(function(r){return r.json()})}
function apiPost(p,d){return fetch('/api/'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json()})}

// ===== 训练模式状态 =====
var T={bl:false,d:null,a:null,x:false,t:0,c:0,s:0,p:0,n:0,g:10,h:[],ch:'',ct:null,si:'kdj',buyPoint:null};
function isBlind(){return T.bl}

// 切换副指标
function swI(si){
T.si=si;
document.getElementById('indKDJ').className=si==='kdj'?'mbtn on':'mbtn';
document.getElementById('indDMA').className=si==='dma'?'mbtn on':'mbtn';
if(T.d&&T.d.klines){
var marks=T.buyPoint?[{date:T.buyPoint.date,price:T.buyPoint.price,type:'buy'}]:[];
drawK(T.ct,T.d.klines,T.si,marks);
}
// 同步更新个股模式图表
if(ST.ct&&ST.klines&&ST.klines.length){
var show=ST.klines.slice(0,ST.curDay);
var marks=ST.trades.filter(function(t){return t.action==='buy'||t.action==='sell'}).map(function(t){return{date:t.date,price:t.price,type:t.action}});
drawK(ST.ct,show,T.si,marks);
}
}

// ===== 个股模式状态 =====
var ST={code:'',idx:0,total:0,qty:0,avg:0,trades:[],days:0,ct:null,blind:false,
klines:[],curDay:0,done:false,wins:0,losses:0,step:60,unlimited:false};

// ===== ECharts初始化 =====
function init(){
T.ct=echarts.init(document.getElementById('chart'),'dark');
window.onresize=function(){T.ct&&T.ct.resize();ST.ct&&ST.ct.resize()}
}

// ===== 绘制K线（带参考线）=====
function drawK(ct,ks,si,marks){
if(!ks||!ks.length)return;
var dt=ks.map(function(k){return k.date});
var oh=ks.map(function(k){return[k.open,k.close,k.low,k.high]});
var vl=ks.map(function(k){return k.volume||0});

// 计算成交量参考线
var maxVol=Math.max.apply(null,vl);
var halfVol=maxVol/2;

// 计算MACD参考线
var macdVals=ks.map(function(k){return Math.max(Math.abs(k.macd_bar),Math.abs(k.macd_dif),Math.abs(k.macd_dea))});
var maxMacd=Math.max.apply(null,macdVals);
if(maxMacd===0)maxMacd=1;
var halfMacd=maxMacd/2;

var ss=[];
if(si==='kdj'){
ss=[
{name:'K',type:'line',data:ks.map(function(k){return k.kdj_k}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'D',type:'line',data:ks.map(function(k){return k.kdj_d}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}},
{name:'J',type:'line',data:ks.map(function(k){return k.kdj_j}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#a855f7'},lineStyle:{width:1.5},
markLine:{silent:true,symbol:'none',data:[{yAxis:20,label:{formatter:'20',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:50,label:{formatter:'50',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:80,label:{formatter:'80',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}}]}}
];
}else{
ss=[
{name:'DMA',type:'line',data:ks.map(function(k){return k.dma}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'AMA',type:'line',data:ks.map(function(k){return k.dma_ama}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5},
markLine:{silent:true,symbol:'none',data:[{yAxis:20,label:{formatter:'20',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:50,label:{formatter:'50',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:80,label:{formatter:'80',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}}]}}
];
}
var isM=window.innerWidth<768;var gl=isM?'12%':'8%';
ct.setOption({
backgroundColor:'#1c2333',animation:false,
tooltip:{trigger:'axis',axisPointer:{type:'cross'},confine:true,className:'tip',textStyle:{fontSize:12},formatter:function(ps){
var i=ps[0].dataIndex,k=ks[i];var dp=0;
if(i>0)dp=(k.close-ks[i-1].close)/ks[i-1].close*100;
var ds=dp>=0?'+'+r2(dp)+'%':r2(dp)+'%';
var dc=dp>=0?'#ef4444':'#22c55e';
return '<b>'+k.date+'</b> <span style="color:'+dc+'">'+ds+'</span><br/>'+'开:'+r2(k.open)+' 收:'+r2(k.close)+'<br/>'+'高:'+r2(k.high)+' 低:'+r2(k.low)+'<br/>'+'MA5:'+r2(k.ma5)+' MA20:'+r2(k.ma20)+'<br/>'+'DIF:'+r2(k.macd_dif)+' DEA:'+r2(k.macd_dea)+'<br/>'+'K:'+r2(k.kdj_k)+' D:'+r2(k.kdj_d)+' J:'+r2(k.kdj_j)+'<br/>'+'量:'+fv(k.volume||0)
}},
legend:{data:['K','MA5','MA10','MA20','MA30'].concat(ss.map(function(s){return s.name})),textStyle:{color:'#8b949e'},top:5},
grid:[{left:gl,right:'3%',top:'10%',height:'40%'},{left:gl,right:'3%',top:'55%',height:'10%'},{left:gl,right:'3%',top:'68%',height:'10%'},{left:gl,right:'3%',top:'82%',height:'12%'}],
xAxis:[{type:'category',data:dt,gridIndex:0,axisLabel:{color:'#8b949e',fontSize:10},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},{type:'category',data:dt,gridIndex:1,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},{type:'category',data:dt,gridIndex:2,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},{type:'category',data:dt,gridIndex:3,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}}],
yAxis:[
{scale:true,gridIndex:0,splitLine:{lineStyle:{color:'#30363d',width:1}},axisLabel:{color:'#8b949e'},axisLine:{lineStyle:{color:'#30363d'}}},
{scale:true,gridIndex:1,splitLine:{show:false},axisLabel:{color:'#8b949e',fontSize:9,formatter:function(v){return(v/1e8).toFixed(1)+'亿'}},axisLine:{lineStyle:{color:'#30363d'}},min:0},
{scale:true,gridIndex:2,splitLine:{show:false},axisLabel:{color:'#8b949e',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
{scale:true,gridIndex:3,splitLine:{lineStyle:{color:'#21262d',type:'dashed'}},axisLabel:{color:'#8b949e',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}}
],
dataZoom:[{type:'inside',xAxisIndex:[0,1,2,3],startValue:dt.length>60?dt[dt.length-60]:dt[0],endValue:dt[dt.length-1],minSpan:5}],
series:[
{name:'K',type:'candlestick',data:oh,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#ef4444',color0:'#22c55e',borderColor:'#ef4444',borderColor0:'#22c55e'},markLine:{silent:true,symbol:'none',data:(marks||[]).map(function(m){var isB=m.type==='buy';return{xAxis:m.date,label:{show:true,formatter:isB?'B':'S',position:'end',color:isB?'#ef4444':'#22c55e',fontSize:12,fontWeight:'bold',offset:[0,4]},lineStyle:{color:'rgba(255,255,255,0.15)',width:1,type:'dotted'}}})}},
{name:'MA5',type:'line',data:ks.map(function(k){return k.ma5}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'MA10',type:'line',data:ks.map(function(k){return k.ma10}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}},
{name:'MA20',type:'line',data:ks.map(function(k){return k.ma20}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#a855f7'},lineStyle:{width:1.5}},
{name:'MA30',type:'line',data:ks.map(function(k){return k.ma30}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#ec4899'},lineStyle:{width:1.5}},
{name:'成交量',type:'bar',data:vl.map(function(v,i){return{value:v,itemStyle:{color:oh[i][1]>=oh[i][0]?'rgba(239,68,68,0.6)':'rgba(34,197,94,0.6)'}}}),xAxisIndex:1,yAxisIndex:1,
markLine:{silent:true,symbol:'none',data:[{yAxis:maxVol,label:{formatter:'最大:'+fv(maxVol),position:'end',color:'#eab308',fontSize:9},lineStyle:{color:'#eab308',type:'dashed',width:1}},{yAxis:halfVol,label:{formatter:'半:'+fv(halfVol),position:'end',color:'#eab308',fontSize:9},lineStyle:{color:'#eab308',type:'dashed',width:1}}]}},

markLine:{silent:true,symbol:'none',data:[{yAxis:0,label:{formatter:'0',position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'solid',width:1}},{yAxis:maxMacd,label:{formatter:r2(maxMacd),position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:halfMacd,label:{formatter:r2(halfMacd),position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:-maxMacd,label:{formatter:r2(-maxMacd),position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}},{yAxis:-halfMacd,label:{formatter:r2(-halfMacd),position:'end',color:'#8b949e',fontSize:9},lineStyle:{color:'#4b5563',type:'dashed',width:1}}]}}

},true)
}

// ===== 训练模式 =====
function go(ov){
T.x=false;T.a=null;
document.getElementById('bSell').disabled=false;
document.getElementById('bHold').disabled=false;
document.getElementById('rBox').className='res';
document.getElementById('bN').style.display='none';
var l=+document.getElementById('sL').value;
var iv=document.getElementById('sI').value.trim();
var params={length:l,blind:T.bl};
if(iv||ov)params.code=iv||ov;
api('random',params).then(function(d){
if(!d||!d.klines||!d.klines.length){alert('获取数据失败');return}
T.d=d;T.a=d.answer;T.ch=d.blind_code||d.code;
document.getElementById('dC').textContent=d.code;
document.getElementById('dB').style.display=T.bl?'inline':'none';
document.getElementById('dD').textContent=d.klines[0].date+' ~ '+d.klines[d.klines.length-1].date;
var lk=d.klines[d.klines.length-1];
var cp=0;if(d.klines.length>1){var pk=d.klines[d.klines.length-2];cp=(lk.close-pk.close)/pk.close*100}
var cs=cp>=0?'+'+r2(cp)+'%':r2(cp)+'%';
var cc=cp>=0?'#ef4444':'#22c55e';
document.getElementById('dP').innerHTML=r2(lk.close)+' <span style="color:'+cc+';font-size:.7em">'+cs+'</span>';
var br=d.buy_hold_return||0;
document.getElementById('bR').innerHTML='<span class="'+(br>=0?'up':'dn')+'">'+(br>=0?'+':'')+r2(br)+'%</span>';
// 选择买入点：倒数第3-5天
var buyOffset=Math.min(3+Math.floor(Math.random()*3),d.klines.length-2);
var buyIdx=d.klines.length-1-buyOffset;
var buyKline=d.klines[buyIdx];
T.buyPoint={idx:buyIdx,date:buyKline.date,price:buyKline.close};
// 显示买入信息
document.getElementById('bBuyDate').textContent=buyKline.date;
document.getElementById('bBuyPrice').textContent=r2(buyKline.close);
// 绘制K线并标记买入点
var marks=[{date:buyKline.date,price:buyKline.close,type:'buy'}];
drawK(T.ct,d.klines,T.si,marks)
})
}
function act(a){
if(T.x||!T.a)return;
T.x=true;
document.getElementById('bSell').disabled=true;
document.getElementById('bHold').disabled=true;
// 买入价和当前价
var buyPrice=T.buyPoint.price;
var curPrice=T.a.close;
var pnl=(curPrice-buyPrice)/buyPrice*100;
// 卖出时：跌了=正确，涨了=错误
// 持有时：涨了=正确，跌了=错误
var priceDown=curPrice<buyPrice;
var ok=false;
if(a==='sell')ok=priceDown;
else ok=!priceDown;
T.t++;if(ok){T.c++;T.s++;T.p+=10+T.s*2}else{T.s=0};
T.n++;
// 保存当前缩放状态
var zoomStart=0,zoomEnd=100;
try{var opt=T.ct.getOption();if(opt&&opt.dataZoom&&opt.dataZoom[0]){zoomStart=opt.dataZoom[0].start;zoomEnd=opt.dataZoom[0].end}}catch(e){}
// 标记买入点+卖出点
var marks=[{date:T.buyPoint.date,price:T.buyPoint.price,type:'buy'}];
if(a==='sell')marks.push({date:T.a.date,price:T.a.close,type:'sell'});
var ak={date:T.a.date,open:T.a.open,close:T.a.close,high:T.a.high,low:T.a.low,volume:0,ma5:null,ma10:null,ma20:null,ma30:null,macd_dif:0,macd_dea:0,macd_bar:0,kdj_k:0,kdj_d:0,kdj_j:0,dma:0,dma_ama:0};
drawK(T.ct,T.d.klines.concat([ak]),T.si,marks);
// 恢复缩放状态
if(zoomStart!==0||zoomEnd!==100)T.ct.dispatchAction({type:'dataZoom',start:zoomStart,end:zoomEnd});
var pe=document.getElementById('dP');
var ac=pnl>=0?'#ef4444':'#22c55e';
pe.innerHTML=r2(T.a.close)+' <span style="color:'+ac+';font-size:.7em">'+(pnl>=0?'+':'')+r2(pnl)+'%</span>';
var rb=document.getElementById('rBox');
rb.className='res show '+(ok?'ok':'no');
document.getElementById('rI').textContent=ok?'✅':'❌';
var msg='';
if(a==='sell')msg='卖出'+(ok?'正确！盈利'+r2(pnl)+'%':'错误！错过上涨'+r2(pnl)+'%');
else msg='持有'+(ok?'正确！享受上涨'+r2(pnl)+'%':'错误！回撤'+r2(pnl)+'%');
document.getElementById('rT').textContent=msg;
document.getElementById('rD').textContent='买入价:'+r2(buyPrice)+' → 当前价:'+r2(curPrice)+' | 收益:'+r2(pnl)+'%';
document.getElementById('bN').style.display='block';
if(T.bl){document.getElementById('dC').textContent=T.ch;document.getElementById('dB').style.display='none'}
T.h.unshift({c:T.ch,ok:ok,a:a,d:a==='sell'?'down':'up',chg:pnl,bh:T.d.buy_hold_return});
uUI();save();
if(T.n>=T.g)setTimeout(showSubmit,500)
}
function nxt(){go()}
function chg(){document.getElementById('sI').value='';go()}
function uUI(){
document.getElementById('sT').textContent=T.t;
document.getElementById('sR').textContent=T.t?Math.round(T.c/T.t*100)+'%':'0%';
document.getElementById('sS').textContent=T.s;
document.getElementById('sP').textContent=T.p;
document.getElementById('pF').style.width=Math.min(T.n/T.g*100,100)+'%';
document.getElementById('pT').textContent=T.n+'/'+T.g;
var hl=document.getElementById('hL');
if(!T.h.length){hl.innerHTML='<div class="empty">暂无</div>';return}
hl.innerHTML=T.h.slice(0,10).map(function(h){
var cls=h.ok?'hc':'hw';
var ic=h.ok?'✅':'❌';
var at=h.a==='buy'?'买':h.a==='sell'?'卖':'持';
return '<div class="ht"><span class="'+cls+'">'+ic+' '+at+'</span><span style="color:#8b949e">'+h.c+' | '+r2(h.chg)+'%</span></div>'
}).join('')
}
function save(){localStorage.setItem('kl',JSON.stringify({t:T.t,c:T.c,s:T.s,p:T.p,n:T.n,d:new Date().toDateString(),h:T.h.slice(0,50)}))}
function load(){var d=JSON.parse(localStorage.getItem('kl')||'{}');if(d.d===new Date().toDateString()){T.t=d.t||0;T.c=d.c||0;T.s=d.s||0;T.p=d.p||0;T.n=d.n||0;T.h=d.h||[]}else{T.t=d.t||0;T.c=d.c||0;T.s=d.s||0}uUI()}

// ===== 个股模拟交易 =====
function stockChangeStep(){
var v=+document.getElementById('stStep').value;
ST.step=v;
ST.unlimited=(v===0);
if(!ST.done)stockGo()
}
function stockGo(){
ST.qty=0;ST.avg=0;ST.trades=[];ST.days=0;ST.done=false;ST.wins=0;ST.losses=0;
var stepVal=+document.getElementById('stStep').value;
ST.step=stepVal;
ST.unlimited=(stepVal===0);
// 请求更多数据，确保有足够K线用于交易
var l=ST.unlimited?300:stepVal*3;
var iv=document.getElementById('sI').value.trim();
var params={length:l};
if(iv)params.code=iv;
api('stock_train',params).then(function(d){
if(!d||!d.klines||!d.klines.length){alert('获取数据失败');return}
ST.code=d.code;ST.klines=d.klines;ST.total=d.klines.length;
// 初始显示步数条K线，剩余的用于交易
ST.curDay=Math.min(stepVal,ST.total-1);
if(ST.curDay<1)ST.curDay=1;
ST.blind=ST.blind||false;
document.getElementById('stC').textContent=ST.blind?'??????':d.code;
document.getElementById('stB').style.display=ST.blind?'inline':'none';
document.getElementById('stDays').textContent='0';
document.getElementById('stBuys').textContent='0';
document.getElementById('stSells').textContent='0';
document.getElementById('stWin').textContent='--';
stockShowChart();
stockUpdateUI()
})
}
function stockShowChart(){
if(!ST.ct)ST.ct=echarts.init(document.getElementById('chart2'),'dark');
var show=ST.klines.slice(0,ST.curDay);
// 构建买卖标记
var marks=ST.trades.filter(function(t){return t.action==='buy'||t.action==='sell'}).map(function(t){return{date:t.date,price:t.price,type:t.action}});
drawK(ST.ct,show,T.si,marks);
if(!show.length)return;
var lk=show[show.length-1];
var cp=0;if(show.length>1){var pk=show[show.length-2];cp=(lk.close-pk.close)/pk.close*100}
var cs=cp>=0?'+'+r2(cp)+'%':r2(cp)+'%';
var cc=cp>=0?'#ef4444':'#22c55e';
document.getElementById('stP').innerHTML=r2(lk.close)+' <span style="color:'+cc+';font-size:.7em">'+cs+'</span>';
document.getElementById('stD').textContent=show[0].date+' ~ '+show[show.length-1].date+' ('+ST.curDay+'/'+ST.total+')'
}
function stockUpdateUI(){
var lk=ST.klines[ST.curDay-1];
var price=lk?lk.close:0;
var realizedPnl=ST.trades.filter(function(t){return t.action==='sell'}).reduce(function(s,t){return s+(t.pnl||0)},0);
var holdPnl=ST.qty>0&&ST.avg>0?(price-ST.avg)/ST.avg*100:0;
var totalPnl=realizedPnl+holdPnl;
var pnlEl=document.getElementById('tPnl');
pnlEl.textContent=(totalPnl>=0?'+':'')+r2(totalPnl)+'%';
pnlEl.className='vl '+(totalPnl>=0?'up':'dn');
var holdEl=document.getElementById('tHoldPnl');
holdEl.textContent=ST.qty>0?(holdPnl>=0?'+':'')+r2(holdPnl)+'%':'--';
holdEl.className='vl '+(holdPnl>=0?'up':'dn');
document.getElementById('stBuys').textContent=ST.trades.filter(function(t){return t.action==='buy'}).length;
document.getElementById('stSells').textContent=ST.trades.filter(function(t){return t.action==='sell'}).length;
var totalTrades=ST.wins+ST.losses;
document.getElementById('stWin').textContent=totalTrades>0?Math.round(ST.wins/totalTrades*100)+'%':'--';
var hl=document.getElementById('stHL');
if(!ST.trades.length){hl.innerHTML='<div class="empty">暂无</div>';return}
hl.innerHTML=ST.trades.slice(-10).reverse().map(function(t){
var cls=t.pnl>=0?'hc':'hw';
var ic=t.action==='buy'?'📈':t.action==='sell'?'📉':t.action==='hold'?'⏸️':'⏭️';
var txt=t.action==='buy'?'买入 '+r2(t.price):t.action==='sell'?'卖出 '+r2(t.price)+' '+(t.pnl>=0?'+':'')+r2(t.pnl)+'%':t.action==='hold'?'持有':'等待';
return '<div class="ht"><span class="'+cls+'">'+ic+' '+t.date+'</span><span style="color:#8b949e">'+txt+'</span></div>'
}).join('')
}
function stockAct(action){
if(ST.done)return;
var lk=ST.klines[ST.curDay-1];
if(!lk)return;
var price=lk.close;
var trade={date:lk.date,action:action,price:price};
if(action==='buy'){
if(ST.qty>0){alert('已持仓，请先卖出');return}
ST.avg=price;
ST.qty=1;
}else if(action==='sell'){
if(ST.qty<=0){alert('无持仓');return}
var pnl=(price-ST.avg)/ST.avg*100;
trade.pnl=pnl;
trade.buyPrice=ST.avg;
if(pnl>0)ST.wins++;else ST.losses++;
ST.qty=0;ST.avg=0
}else if(action==='hold'){
trade.holdPnl=ST.qty>0?(price-ST.avg)/ST.avg*100:0
}else if(action==='wait'){
// 等待，不交易
}
ST.trades.push(trade);
ST.days=ST.curDay;
ST.curDay++;
// 判断是否到达最后一个K线
if(ST.curDay>=ST.total){
stockFinish()
}else{
document.getElementById('stNext').style.display='none';
stockShowChart();
stockUpdateUI()
}
}
function stockFinish(){
ST.done=true;
if(ST.qty>0){
var finalPrice=ST.klines[ST.total-1].close;
var finalPnl=(finalPrice-ST.avg)/ST.avg*100;
ST.trades.push({date:ST.klines[ST.total-1].date,action:'settle',price:finalPrice,buyPrice:ST.avg,pnl:finalPnl});
if(finalPnl>0)ST.wins++;else ST.losses++;
ST.qty=0;ST.avg=0
}
var totalPnl=ST.trades.reduce(function(s,t){return s+(t.pnl||0)},0);
document.getElementById('stNext').style.display='block';
document.getElementById('stNext').textContent='🔄 重新训练';
// 提交排行榜
var klVal=ST.unlimited?0:ST.step;
var catKey=ST.blind?'stockblind':'stock';
var name=prompt('训练结束！累积收益：'+r2(totalPnl)+'%\n输入名字提交排行榜：');
if(name){
apiPost('submit_score',{name:name,score:Math.round(totalPnl*100)/100,mode:catKey,kl:klVal,blind:ST.blind,total:ST.days,correct:ST.wins}).then(function(r){
if(r&&r.success){alert('提交成功！')}else{alert('提交失败：'+(r.error||'未知错误'))}
})
}
}
function stockNext(){
if(ST.done){
stockGo()
}else{
document.getElementById('stNext').style.display='none';
stockShowChart();
stockUpdateUI()
}
}
function stockReset(){
ST.code='';ST.idx=0;
document.getElementById('sI').value='';
stockGo()
}

// ===== 模式切换 =====
function swM(m,e){
document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});
if(e)e.target.classList.add('on');
if(m==='board'){
document.getElementById('vTrain').style.display='none';
document.getElementById('vStock').style.display='none';
document.getElementById('vBoard').style.display='flex';
ldB('train')
}else if(m==='stock'||m==='stockblind'){
document.getElementById('vTrain').style.display='none';
document.getElementById('vStock').style.display='flex';
document.getElementById('vBoard').style.display='none';
ST.blind=(m==='stockblind');
setTimeout(function(){
if(!ST.ct)ST.ct=echarts.init(document.getElementById('chart2'),'dark');
stockGo()
},100)
}else{
document.getElementById('vTrain').style.display='flex';
document.getElementById('vStock').style.display='none';
document.getElementById('vBoard').style.display='none';
T.bl=(m==='blind');
go()
}
}

// ===== 排行榜 =====
var Bcat='train';Bkl=-1;
function ldB(cat,btn){
Bcat=cat;
if(btn){btn.parentElement.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
ldBShow()
}
function ldK(kl,btn){
Bkl=kl;
if(btn){document.getElementById('bKL').querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
ldBShow()
}
function ldBShow(){
var bl=document.getElementById('bL');
api('leaderboard').then(function(b){
var items=[];
if(Bkl===-1){
// 全部：合并该模式下所有K线数的记录
Object.keys(b).forEach(function(k){
if(k.indexOf(Bcat+'_')===0){
items=items.concat(b[k])
}
})
items.sort(function(a,b){return b.score-a.score})
}else{
var key=Bcat+'_'+Bkl;
items=b[key]||[]
}
if(!items.length){bl.innerHTML='<div class="empty">暂无数据</div>';return}
bl.innerHTML=items.map(function(it,i){
var ds=new Date(it.time).toLocaleDateString('zh-CN');
var sc=it.score.toFixed(2)+'%';
var klInfo=it.details&&it.details.kl?' ('+it.details.kl+'条)':'';
return '<div class="ht"><span style="color:#58a6ff;font-weight:bold">'+(i+1)+'</span><span>'+(it.name||'匿名')+klInfo+'</span><span style="color:#8b949e">'+ds+'</span><span style="color:#58a6ff;font-weight:bold">'+sc+'</span></div>'
}).join('')
}).catch(function(e){
bl.innerHTML='<div class="empty">加载失败</div>';
console.error('Leaderboard error:',e)
})
}
function showSubmit(){
var name=prompt('训练完成！输入名字提交成绩：');
var klVal=+document.getElementById('sL').value;
var modeVal=T.bl?'blind':'train';
var scoreVal=T.t>0?Math.round(T.c/T.t*10000)/100:0;
if(name){apiPost('submit_score',{name:name,score:scoreVal,mode:modeVal,kl:klVal,blind:T.bl,total:T.t,correct:T.c}).then(function(r){
if(r&&r.success){alert('提交成功！');T.n=0;T.p=0;save();uUI()}else{alert('提交失败：'+(r.error||''))}
})}
}

window.onload=function(){init();load();go()};
</script>
