<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K线训练</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:1.1em;color:#58a6ff}
.sts{display:flex;gap:14px;font-size:.8em}
.sts b{color:#58a6ff}
.wrap{max-width:1400px;margin:0 auto;padding:10px}
.modes{display:flex;gap:8px;margin-bottom:10px}
.mbtn{padding:7px 14px;background:#1c2333;border:1px solid #30363d;color:#e6edf3;border-radius:6px;cursor:pointer;font-size:.85em}
.mbtn.on{background:#58a6ff;color:#000;font-weight:bold}
.row{display:flex;gap:10px;flex-direction:column}
@media(min-width:1024px){.row{flex-direction:row}.left{flex:1}.right{width:280px}}
.box{background:#1c2333;border-radius:10px;border:1px solid #30363d;overflow:hidden}
.box-h{padding:10px 14px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.code{font-weight:bold;font-size:1.1em}
.prc{font-size:1.3em;font-weight:bold}
.up{color:#ef4444}.dn{color:#22c55e}
#chart{width:100%;height:700px}
@media(max-width:768px){#chart{height:500px}}
.card{background:#1c2333;border-radius:10px;border:1px solid #30363d;padding:12px;margin-bottom:10px}
.card-t{font-size:.8em;color:#8b949e;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #30363d}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.abtn{padding:12px 6px;border:none;border-radius:8px;font-size:.95em;font-weight:bold;cursor:pointer}
.abtn:hover{opacity:.9}.abtn:disabled{opacity:.4;cursor:not-allowed}
.bb{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.bs{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.bh{background:linear-gradient(135deg,#eab308,#ca8a04);color:#fff}
.res{text-align:center;padding:14px;border-radius:8px;display:none;margin-bottom:10px}
.res.show{display:block}
.res.ok{background:rgba(34,197,94,.15);border:1px solid #22c55e}
.res.no{background:rgba(239,68,68,.15);border:1px solid #ef4444}
.res i{font-size:1.8em}
.res p{font-weight:bold;margin:4px 0}
.res span{color:#8b949e;font-size:.8em}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.85em}
.bp{background:#58a6ff;color:#000;font-weight:bold}
.bs2{background:#0d1117;border:1px solid #30363d;color:#e6edf3}
.set{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #30363d}
.set:last-child{border:0}
.set label{color:#8b949e;font-size:.8em}
select,input{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:5px 8px;border-radius:5px;font-size:.8em}
.inp{width:100%;margin-top:4px}
.pbar{height:5px;background:#0d1117;border-radius:3px;overflow:hidden;margin:6px 0}
.pfill{height:100%;background:linear-gradient(90deg,#58a6ff,#22c55e)}
.ptxt{text-align:center;color:#8b949e;font-size:.7em}
.bhr{text-align:center;margin-top:6px;font-size:.85em}
.hist{max-height:120px;overflow-y:auto}
.ht{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #30363d;font-size:.75em}
.hc{color:#22c55e}.hw{color:#ef4444}
.empty{text-align:center;padding:16px;color:#8b949e;font-size:.8em}
.badge{background:#a855f7;color:#fff;padding:1px 6px;border-radius:3px;font-size:.65em;margin-left:6px}
.tip{max-width:220px !important;word-break:break-all !important}
@media(max-width:768px){.tip{font-size:11px !important;max-width:180px !important}}
</style>
</head>
<body>
<div class="hdr">
<h1>K线训练</h1>
<div class="sts"><span>📊 总<b id="sT">0</b></span><span>✅ 率<b id="sR">0%</b></span><span>🔥 连<b id="sS">0</b></span><span>⭐ 分<b id="sP">0</b></span></div>
</div>
<div class="wrap">
<div class="modes">
<button class="mbtn on" onclick="swM('train')">📊 训练</button>
<button class="mbtn" onclick="swM('blind')">🔍 盲测</button>
<button class="mbtn" onclick="swM('board')">🏆 排行榜</button>
</div>
<div class="row" id="vTrain">
<div class="left">
<div class="box">
<div class="box-h">
<div><span class="code" id="dC">--</span><span class="badge" id="dB" style="display:none">盲测</span><span style="color:#8b949e;font-size:.85em;margin-left:8px" id="dD">--</span></div>
<div class="prc" id="dP">--</div>
</div>
<div id="chart"></div>
</div>
</div>
<div class="right">
<div class="card">
<div class="card-t">🎯 预测操作</div>
<div class="btns">
<button class="abtn bb" id="bBuy" onclick="act('buy')">📈 买入</button>
<button class="abtn bs" id="bSell" onclick="act('sell')">📉 卖出</button>
<button class="abtn bh" id="bHold" onclick="act('hold')">⏸️ 持有</button>
</div>
<div class="res" id="rBox"><i id="rI"></i><p id="rT"></p><span id="rD"></span></div>
<div style="display:flex;gap:6px"><button class="btn bp" id="bN" onclick="nxt()" style="display:none;flex:1">➡️ 下一题</button><button class="btn bs2" onclick="chg()" style="flex:1">🔄 换股</button></div>
</div>
<div class="card">
<div class="card-t">⚙️ 设置</div>
<div class="set"><label>K线数</label><select id="sL" onchange="go()"><option>30</option><option selected>60</option><option>90</option><option>120</option></select></div>
<div class="set"><label>每日目标(题)</label><select id="sG" onchange="S.g=+this.value;uUI()"><option selected>10</option><option>20</option><option>50</option></select></div>
<div class="set" style="flex-direction:column;align-items:stretch"><label>个股代码</label><div style="display:flex;gap:4px;margin-top:4px"><input id="sI" style="flex:1" placeholder="sh.600519" onkeydown="if(event.key==='Enter')go()"><button class="btn bs2" onclick="go()">确定</button></div><div style="color:#8b949e;font-size:.7em;margin-top:4px">上证sh.600519 深证sz.000858 科创sh.688981 北交bj.430047</div></div>
</div>
<div class="card">
<div class="card-t">📊 进度</div>
<div class="pbar"><div class="pfill" id="pF" style="width:0%"></div></div>
<div class="ptxt" id="pT">0/10</div>
<div class="bhr">买入持有: <b id="bR">--</b></div>
</div>
<div class="card">
<div class="card-t">📋 记录</div>
<div class="hist" id="hL"><div class="empty">暂无</div></div>
</div>
</div>
</div>
<div class="row" id="vBoard" style="display:none">
<div class="card" style="flex:1">
<div class="card-t">排行榜</div>
<div class="modes" style="margin-bottom:8px">
<button class="mbtn on" onclick="ldB('daily',this)">📅 日</button>
<button class="mbtn" onclick="ldB('weekly',this)">📆 周</button>
<button class="mbtn" onclick="ldB('monthly',this)">🗓️ 月</button>
<button class="mbtn" onclick="ldB('all_time',this)">📋 总</button>
<button class="mbtn" onclick="ldB('blind_test',this)">🔍 盲测</button>
</div>
<div id="bL"><div class="empty">暂无</div></div>
</div>
</div>
</div>
<script>
var S={bl:false,d:null,a:null,x:false,t:0,c:0,s:0,p:0,n:0,g:10,h:[],ch:'',ct:null,si:'kdj'};
function r2(v){return v==null||isNaN(v)?'0.00':Number(v).toFixed(2)}
function fv(v){return v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(2)+'万':String(v)}
function api(p,q){var u='/api/'+p;if(q){var s=new URLSearchParams(q).toString();if(s)u+='?'+s}return fetch(u).then(function(r){return r.json()})}
function init(){S.ct=echarts.init(document.getElementById('chart'),'dark');window.onresize=function(){S.ct&&S.ct.resize()}}
function draw(ks,ak){
if(!ks||!ks.length)return;
var ad=ak?ks.concat([ak]):ks;
var dt=ad.map(function(k){return k.date});
var oh=ad.map(function(k){return[k.open,k.close,k.low,k.high]});
var vl=ad.map(function(k){return k.volume||0});
var sk=ad[ad.length-1];
var cp=0;
if(ak){var pk=ks[ks.length-1];cp=(sk.close-pk.close)/pk.close*100}
else if(ad.length>1){var pk=ad[ad.length-2];cp=(sk.close-pk.close)/pk.close*100}
var cs=cp>=0?'+'+r2(cp)+'%':r2(cp)+'%';
var cc=cp>=0?'#ef4444':'#22c55e';
var si=S.si||'kdj';
var ss=[];
if(si==='kdj'){
ss=[
{name:'K',type:'line',data:ad.map(function(k){return k.kdj_k}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5},markLine:{silent:true,symbol:'none',lineStyle:{color:'#30363d',type:'dashed',width:1},data:[{yAxis:50,label:{formatter:'50',color:'#8b949e',fontSize:9}},{yAxis:100,label:{formatter:'100',color:'#8b949e',fontSize:9}}]}},
{name:'D',type:'line',data:ad.map(function(k){return k.kdj_d}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}},
{name:'J',type:'line',data:ad.map(function(k){return k.kdj_j}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#a855f7'},lineStyle:{width:1.5}}
];
}else{
ss=[
{name:'DMA',type:'line',data:ad.map(function(k){return k.dma}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'AMA',type:'line',data:ad.map(function(k){return k.dma_ama}),smooth:true,symbol:'none',xAxisIndex:3,yAxisIndex:3,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}}
];
}
var isM=window.innerWidth<768;var gl=isM?'12%':'8%';
var opt={
backgroundColor:'#1c2333',animation:false,
tooltip:{trigger:'axis',axisPointer:{type:'cross'},confine:true,className:'tip',textStyle:{fontSize:12},formatter:function(ps){
var i=ps[0].dataIndex,k=ad[i];var dp=0;
if(i>0)dp=(k.close-ad[i-1].close)/ad[i-1].close*100;
var ds=dp>=0?'+'+r2(dp)+'%':r2(dp)+'%';
var dc=dp>=0?'#ef4444':'#22c55e';
return '<b>'+k.date+'</b> <span style="color:'+dc+'">'+ds+'</span><br/>'+'开:'+r2(k.open)+' 收:'+r2(k.close)+'<br/>'+'高:'+r2(k.high)+' 低:'+r2(k.low)+'<br/>'+'MA5:'+r2(k.ma5)+' MA20:'+r2(k.ma20)+'<br/>'+'DIF:'+r2(k.macd_dif)+' DEA:'+r2(k.macd_dea)+'<br/>'+'K:'+r2(k.kdj_k)+' D:'+r2(k.kdj_d)+' J:'+r2(k.kdj_j)+'<br/>'+'量:'+fv(k.volume||0)
}},
legend:{data:['K','MA5','MA10','MA20','MA30'].concat(ss.map(function(s){return s.name})),textStyle:{color:'#8b949e'},top:5},
grid:[
{left:gl,right:'3%',top:'10%',height:'40%'},
{left:gl,right:'3%',top:'55%',height:'10%'},
{left:gl,right:'3%',top:'68%',height:'10%'},
{left:gl,right:'3%',top:'82%',height:'12%'}
],
xAxis:[
{type:'category',data:dt,gridIndex:0,axisLabel:{color:'#8b949e',fontSize:10},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
{type:'category',data:dt,gridIndex:1,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
{type:'category',data:dt,gridIndex:2,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}},
{type:'category',data:dt,gridIndex:3,axisLabel:{show:false},axisLine:{lineStyle:{color:'#30363d'}},splitLine:{show:false}}
],
yAxis:[
{scale:true,gridIndex:0,splitLine:{lineStyle:{color:'#30363d',width:1}},axisLabel:{color:'#8b949e'},axisLine:{lineStyle:{color:'#30363d'}}},
{scale:true,gridIndex:1,splitLine:{show:false},axisLabel:{color:'#8b949e',fontSize:9,formatter:function(v){return(v/1e8).toFixed(1)+'亿'}},axisLine:{lineStyle:{color:'#30363d'}},min:0,interval:function(v){return v<1e8?0.1e8:v<5e8?0.5e8:1e8}},
{scale:true,gridIndex:2,splitLine:{show:false},axisLabel:{color:'#8b949e',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
{scale:true,gridIndex:3,splitLine:{lineStyle:{color:'#21262d',type:'dashed'}},axisLabel:{color:'#8b949e',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}}
],
dataZoom:[{type:'inside',xAxisIndex:[0,1,2,3],start:0,end:100}],
series:[
{name:'K',type:'candlestick',data:oh,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#ef4444',color0:'#22c55e',borderColor:'#ef4444',borderColor0:'#22c55e'}},
{name:'MA5',type:'line',data:ad.map(function(k){return k.ma5}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'MA10',type:'line',data:ad.map(function(k){return k.ma10}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}},
{name:'MA20',type:'line',data:ad.map(function(k){return k.ma20}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#a855f7'},lineStyle:{width:1.5}},
{name:'MA30',type:'line',data:ad.map(function(k){return k.ma30}),smooth:true,sampling:'average',symbol:'none',xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#ec4899'},lineStyle:{width:1.5}},
{name:'成交量',type:'bar',data:vl.map(function(v,i){return{value:v,itemStyle:{color:oh[i][1]>=oh[i][0]?'rgba(239,68,68,0.6)':'rgba(34,197,94,0.6)'}}}),xAxisIndex:1,yAxisIndex:1,markLine:{silent:true,symbol:'none',lineStyle:{color:'#f59e0b',type:'dashed',width:1},data:[{yAxis:Math.max.apply(null,vl),label:{formatter:function(p){return(p.value/1e8).toFixed(1)+'亿'},color:'#f59e0b',fontSize:9}},{yAxis:Math.max.apply(null,vl)/2,label:{formatter:function(p){return(p.value/1e8).toFixed(1)+'亿'},color:'#f59e0b',fontSize:9}}]}},
{name:'DIF',type:'line',data:ad.map(function(k){return k.macd_dif}),smooth:true,symbol:'none',xAxisIndex:2,yAxisIndex:2,itemStyle:{color:'#60a5fa'},lineStyle:{width:1.5}},
{name:'DEA',type:'line',data:ad.map(function(k){return k.macd_dea}),smooth:true,symbol:'none',xAxisIndex:2,yAxisIndex:2,itemStyle:{color:'#f59e0b'},lineStyle:{width:1.5}},
{name:'MACD',type:'bar',data:ad.map(function(k){return{value:k.macd_bar,itemStyle:{color:k.macd_bar>=0?'#ef4444':'#22c55e'}}}),xAxisIndex:2,yAxisIndex:2,markLine:{silent:true,symbol:'none',lineStyle:{color:'#8b949e',type:'dashed',width:1},data:[{yAxis:0,label:{formatter:'0',color:'#8b949e',fontSize:9}},{yAxis:(function(){var mx=0;ad.forEach(function(k){var m=Math.max(Math.abs(k.macd_dif),Math.abs(k.macd_dea),Math.abs(k.macd_bar));if(m>mx)mx=m});return mx})(),label:{formatter:function(p){return r2(p.value)},color:'#8b949e',fontSize:9}},{yAxis:-(function(){var mx=0;ad.forEach(function(k){var m=Math.max(Math.abs(k.macd_dif),Math.abs(k.macd_dea),Math.abs(k.macd_bar));if(m>mx)mx=m});return mx})(),label:{formatter:function(p){return r2(p.value)},color:'#8b949e',fontSize:9}}]}}
].concat(ss)
};
S.ct.setOption(opt,true)
}
function go(ov){
S.x=false;S.a=null;
document.getElementById('bBuy').disabled=false;
document.getElementById('bSell').disabled=false;
document.getElementById('bHold').disabled=false;
document.getElementById('rBox').className='res';
document.getElementById('bN').style.display='none';
var l=+document.getElementById('sL').value;
var iv=document.getElementById('sI').value.trim();
var sc=ov||iv||undefined;
api('random',{length:l,blind:S.bl,code:sc}).then(function(d){
if(!d||!d.klines||!d.klines.length){alert('获取数据失败');return}
S.d=d;S.a=d.answer;S.ch=d.blind_code||d.code;
document.getElementById('dC').textContent=d.code;
document.getElementById('dB').style.display=S.bl?'inline':'none';
document.getElementById('dD').textContent=d.klines[0].date+' ~ '+d.klines[d.klines.length-1].date;
var lk=d.klines[d.klines.length-1];
var cp=0;if(d.klines.length>1){var pk=d.klines[d.klines.length-2];cp=(lk.close-pk.close)/pk.close*100}
var cs=cp>=0?'+'+r2(cp)+'%':r2(cp)+'%';
var cc=cp>=0?'#ef4444':'#22c55e';
document.getElementById('dP').innerHTML=r2(lk.close)+' <span style="color:'+cc+';font-size:.7em">'+cs+'</span>';
var br=d.buy_hold_return||0;
document.getElementById('bR').innerHTML='<span class="'+(br>=0?'up':'dn')+'">'+(br>=0?'+':'')+r2(br)+'%</span>';
draw(d.klines,null)
})
}
function act(a){
if(S.x||!S.a)return;
S.x=true;
document.getElementById('bBuy').disabled=true;
document.getElementById('bSell').disabled=true;
document.getElementById('bHold').disabled=true;
var dir=S.a.direction;
var ok=false;
if(a==='buy')ok=dir==='up';
else if(a==='sell')ok=dir==='down';
else ok=true;
S.t++;if(ok&&a!=='hold'){S.c++;S.s++;S.p+=10+S.s*2}else if(!ok)S.s=0;
S.n++;
var ak={date:S.a.date,open:S.a.open,close:S.a.close,high:S.a.high,low:S.a.low,volume:0,ma5:null,ma10:null,ma20:null,ma30:null,macd_dif:0,macd_dea:0,macd_bar:0,kdj_k:0,kdj_d:0,kdj_j:0,dma:0,dma_ama:0};
draw(S.d.klines,ak);
var pe=document.getElementById('dP');
var ac=dir==='up'?'#ef4444':'#22c55e';
var as=dir==='up'?'+':'-';
pe.innerHTML=r2(S.a.close)+' <span style="color:'+ac+';font-size:.7em">'+as+r2(S.a.change_pct)+'%</span>';
var rb=document.getElementById('rBox');
rb.className='res show '+(ok?'ok':'no');
document.getElementById('rI').textContent=ok?'✅':'❌';
var msg='';
if(a==='hold')msg='持有观望';
else msg=(a==='buy'?'买入':'卖出')+(ok?'正确！':'错误！');
document.getElementById('rT').textContent=msg;
document.getElementById('rD').textContent='变化:'+r2(S.a.change_pct)+'% | 买入持有:'+r2(S.d.buy_hold_return)+'%';
document.getElementById('bN').style.display='block';
if(S.bl){document.getElementById('dC').textContent=S.ch;document.getElementById('dB').style.display='none'}
S.h.unshift({c:S.ch,ok:ok,a:a,d:dir,chg:S.a.change_pct,bh:S.d.buy_hold_return});
uUI();save();
if(S.n>=S.g)setTimeout(showSubmit,500)
}
function nxt(){go()}
function chg(){document.getElementById('sI').value='';go()}
function uUI(){
document.getElementById('sT').textContent=S.t;
document.getElementById('sR').textContent=S.t?Math.round(S.c/S.t*100)+'%':'0%';
document.getElementById('sS').textContent=S.s;
document.getElementById('sP').textContent=S.p;
document.getElementById('pF').style.width=Math.min(S.n/S.g*100,100)+'%';
document.getElementById('pT').textContent=S.n+'/'+S.g;
var hl=document.getElementById('hL');
if(!S.h.length){hl.innerHTML='<div class="empty">暂无</div>';return}
hl.innerHTML=S.h.slice(0,10).map(function(h){
var cls=h.ok?'hc':'hw';
var ic=h.ok?'✅':'❌';
var at=h.a==='buy'?'买':h.a==='sell'?'卖':'持';
return '<div class="ht"><span class="'+cls+'">'+ic+' '+at+'</span><span style="color:#8b949e">'+h.c+' | '+r2(h.chg)+'%</span></div>'
}).join('')
}
function save(){localStorage.setItem('kl',JSON.stringify({t:S.t,c:S.c,s:S.s,p:S.p,n:S.n,d:new Date().toDateString(),h:S.h.slice(0,50)}))}
function load(){var d=JSON.parse(localStorage.getItem('kl')||'{}');if(d.d===new Date().toDateString()){S.t=d.t||0;S.c=d.c||0;S.s=d.s||0;S.p=d.p||0;S.n=d.n||0;S.h=d.h||[]}else{S.t=d.t||0;S.c=d.c||0;S.s=d.s||0}uUI()}
function swM(m){
document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});
event.target.classList.add('on');
if(m==='board'){document.getElementById('vTrain').style.display='none';document.getElementById('vBoard').style.display='flex';ldB('daily')}
else{document.getElementById('vTrain').style.display='flex';document.getElementById('vBoard').style.display='none';S.bl=m==='blind';go()}
}
function ldB(cat,btn){
if(btn){btn.parentElement.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});btn.classList.add('on')}
var bl=document.getElementById('bL');
api('leaderboard').then(function(b){
var items=b[cat]||[];
if(!items.length){bl.innerHTML='<div class="empty">暂无</div>';return}
bl.innerHTML=items.map(function(it,i){
var rc=i<3?'rank-'+(i+1):'';
var ds=new Date(it.time).toLocaleDateString('zh-CN');
return '<div class="ht"><span style="color:#58a6ff;font-weight:bold">'+(i+1)+'</span><span>'+it.name+'</span><span style="color:#8b949e">'+ds+'</span><span style="color:#58a6ff;font-weight:bold">'+it.score+'</span></div>'
}).join('')
})
}
function showSubmit(){
var name=prompt('训练完成！输入名字提交成绩：');
if(name){api('submit_score',{name:name,score:S.p,mode:'daily',blind:S.bl,total:S.t,correct:S.c}).then(function(){alert('提交成功！');S.n=0;S.p=0;save();uUI()})}
}
window.onload=function(){init();load();go()};
</script>
